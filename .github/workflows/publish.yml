name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      publish_marketplace:
        description: 'Publish the packaged VSIX to the Visual Studio Marketplace'
        required: true
        type: boolean
        default: false
      pre_release:
        description: 'Package and publish as a pre-release extension'
        required: true
        type: boolean
        default: true

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Package VSIX
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          args=()
          if [ "${{ inputs.publish_marketplace }}" = "true" ]; then
            if [ "${GITHUB_REF_NAME}" != "master" ]; then
              echo "Marketplace publishing is only allowed from master. Current branch: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
            args+=("--publish-marketplace")
          fi
          if [ "${{ inputs.pre_release }}" = "true" ]; then
            args+=("--pre-release")
          fi
          node scripts/package-vsix.cjs "${args[@]}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: forgeflow-vsix
          path: dist/*.vsix
